<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<link rel="stylesheet" type="text/css" href="./styles/index.css">
		<title>M&A Easy Reader</title>
	</head>
	<body>
		<!-- Custom title bar with minimize, maximize, and close buttons -->
		<div class="title-bar">
			<div id="left-title-buttons">
				<input type="image"
				src="images/save.png" id="save-button"
				onMouseOver="this.src='images/saveHover.png'"
				onMouseOut="this.src='images/save.png'" 
				style="display:none"
				>
				<input type="image"
				src="images/load.png" id="load-button"
				onMouseOver="this.src='images/loadHover.png'"
				onMouseOut="this.src='images/load.png'"
				>
				<input id="restart-button"
				type="image" src="images/restart.png"
				onMouseOver="this.src='images/restartHover.png'"
				onMouseOut="this.src='images/restart.png'"
				>
			</div>

			<h3 id="app-title">M&A Easy Reader</h3>
			<div id="right-title-buttons">
				<input type="image"
				src="images/minimize.png" id="minimize-button"
				onMouseOver="this.src='images/minimizeHover.png'"
				onMouseOut="this.src='images/minimize.png'"
				>
				<input type="image"
				src="images/maximize.png" id="maximize-button"
				onMouseOver="this.src='images/maximizeHover.png'"
				onMouseOut="this.src='images/maximize.png'"
				>
				<input type="image"
				src="images/close.png" id="close-button"
				onMouseOver="this.src='images/closeHover.png'"
				onMouseOut="this.src='images/close.png'"
				>
			</div>
		</div>

		<!--This is where the user will upload their documents.
			The third slot only reveals after the 2nd slot has been filled-->
		<div id="docs-and-console">
			<!--The console that appears when you begin comparing-->
			<div id="console-block" style="display:none">
				<div id="console-contents">
					<input id="hide-console"
					type="image" src="images/hide.png"
					onMouseOver="this.src='images/hideHover.png'"
					onMouseOut="this.src='images/hide.png'"/>
					<ol id="table-of-contents"></ol>
				</div>
			</div>
			<div id="docs">
				<!--The file upload field itself is hidden
					We use an input with an image that links to the file upload
					purely because it looks better-->
				<div id="block1" class="doc-block">
					<input hidden
					type="file" accept=".doc, .docx"
					onchange="fileAdded()"/>

					<!--This button activates the input above,
						asking for a file-->
					<input class="file-button"
					type="image" src="images/upload.png"/>

					<input class="doc-title" 
					onClick="this.select()" value=""
					onchange="nameChange()">
					<p class="upload-text">Upload a file</p>

					<!-- Button to hide document. Starts hidden -->
					<input class="hide-button"
					type="image" src="images/hide.png"
					style="display:none"
					onMouseOver="this.src='images/hideHover.png'"
					onMouseOut="this.src='images/hide.png'"/>

					<p class="doc"></p>
				</div>

				<div id="block2" class="doc-block">
					<input hidden
					type="file" accept=".doc, .docx"
					onchange="fileAdded()"/>

					<input class="file-button"
					type="image" src="images/upload.png"/>

					<input class="doc-title" 
					onClick="this.select()" value=""
					onchange="nameChange()">
					<p class="upload-text">Upload a file</p>

					<input class="hide-button"
					type="image" src="images/hide.png"
					style="display:none"
					onMouseOver="this.src='images/hideHover.png'"
					onMouseOut="this.src='images/hide.png'"/>

					<p class="doc"></p>
				</div>
			</div>
		</div>

		<!--Button to initiate comparison-->
		<input id="compare-button"
		type="image" src="images/compare.png"
		onMouseOver="this.src='images/compareHover.png'"
		onMouseOut="this.src='images/compare.png'"/>

		<!--Button to add a new doc after comparing-->
		<input id="add-button"
		type="image" src="images/add.png"
		onMouseOver="this.src='images/addHover.png'"
		onMouseOut="this.src='images/add.png'"/>

		<!--Button to open a page containing all definitions-->
		<input id="def-button"
		type="image" src="images/def.png"
		onMouseOver="this.src='images/defHover.png'"
		onMouseOut="this.src='images/def.png'"/>

		<!--Button to open the most recent doc in your word processor-->
		<input id="edit-button"
		type="image" src="images/edit.png"
		onMouseOver="this.src='images/editHover.png'"
		onMouseOut="this.src='images/edit.png'"/>
	</body>
	<footer>
		<img id="logo" src="images/logo.png"/>
	</footer>
	<script type="text/javascript" src="./scripts/mainWindow.js">
	</script>
</html>
