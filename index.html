<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<link rel="stylesheet" type="text/css" href="./styles/index.css">
		<title>Shell Mk.1</title>
	</head>
	<body>
		<!-- Custom title bar -->
		<div class="title-bar">
			<div class="title-buttons">
				<input type="image"
				src="images/minimize.png" id="minimize-button"
				>
				<input type="image"
				src="images/maximize.png" id="maximize-button"
				>
				<input type="image"
				src="images/close.png" id="close-button"
				>
			</div>
		</div>
		<div class="docs">
			<!--The file upload field itself is hidden
				We use an input with an image that links to the file upload
				purely because it looks better-->
			<div id="block1" class="block">
				<input hidden
				type="file" accept=".doc, .docx"
				onchange="fileAdded()"></input>

				<!--This button activates the input above,
					asking for a file-->
				<input class="file-button"
				type="image" src="images/upload.png"></button>

				<p>Upload a file</p>
			</div>

			<div id="block2" class="block">
				<input hidden
				type="file" accept=".doc, .docx"
				onchange="fileAdded()"></input>

				<input class="file-button"
				type="image" src="images/upload.png"></button>

				<p>Upload a file</p>
			</div>

			<div id="block3" class="block" style="display: none">
				<input hidden
				type="file" accept=".doc, .docx"
				onchange="fileAdded()"></input>

				<input class="file-button"
				type="image" src="images/plus.png"></button>

				<p></p>
			</div>

			<div id="block4" class="block" style="display: none">
				<input hidden
				type="file" accept=".doc, .docx"
				onchange="fileAdded()"></input>

				<input class="file-button"
				type="image" src="images/plus.png"></button>

				<p></p>
			</div>
		</div>
	</body>
	<footer>
		
	</footer>
	<script type="text/javascript" src="./scripts/mainWindow.js">
	</script>
</html>
